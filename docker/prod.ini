; -----------------------------
; PHP Production Settings
; -----------------------------
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

max_execution_time = 120
memory_limit = 512M
post_max_size = 50M
upload_max_filesize = 50M

; Opcache on and not re-checking file mtimes on every request — the image is rebuilt on deploy,
; source doesn't change under a running container the way it does in dev.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
