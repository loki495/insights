name: ci

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aspell (for peck typo checks)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq aspell aspell-en

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: intl, sockets, pcntl
          coverage: pcov

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright browser (for pest-plugin-browser)
        run: npx playwright install --with-deps chromium

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      # Runs rector --dry-run, pint --test, peck, phpstan, and pest --coverage — the same
      # `composer test` a contributor is told to run locally, so CI can't drift out of sync
      # with the documented workflow.
      - name: Run test suite
        run: composer test
