name: insights

volumes:
  mysql-data: {}

services:
  app:
    container_name: insights-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/logs:/var/www/html/logs:rw
      - ./storage/ssh:/var/www/html/storage/ssh:rw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insights.rule=Host(`insights.dev.local.test`)"
      - "traefik.http.routers.insights.entrypoints=web"
      - "traefik.http.services.insights.loadbalancer.server.port=80"
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.4-apache
        COPY docker/setup-dev-container.sh /tmp/setup.sh
        RUN chmod +x /tmp/setup.sh && /usr/bin/bash /tmp/setup.sh
    networks:
      - web

  vite:
    image: node:18
    container_name: insights-vite
    working_dir: /var/www/html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ./:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insights-vite.rule=Host(`vite.insights.dev.local.test`)"
      - "traefik.http.routers.insights-vite.entrypoints=web"
      - "traefik.http.services.insights-vite.loadbalancer.server.port=5173"
    networks:
      - web

networks:
  web:
    external: true
