name: insights

volumes:
  mysql-data: {}

services:
  app:
    container_name: insights-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/logs:/var/www/html/logs:rw
      - ./storage/ssh:/var/www/html/storage/ssh:rw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insights.rule=Host(`insights.dev.local.test`)"
      - "traefik.http.routers.insights.entrypoints=web"
      - "traefik.http.services.insights.loadbalancer.server.port=80"
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.4-apache
        ENV PLAYWRIGHT_BROWSERS_PATH=/opt/ms-playwright
        COPY package.json /tmp/package.json
        COPY docker/setup-dev-container.sh /tmp/setup.sh
        RUN chmod +x /tmp/setup.sh && /usr/bin/bash /tmp/setup.sh
    networks:
      - web

  vite:
    image: node:20
    container_name: insights-vite
    restart: unless-stopped
    working_dir: /var/www/html
    # Installs dependencies on every start rather than requiring a separate manual `npm install`
    # step — cheap when node_modules is already current (npm no-ops), and picks up a fresh
    # package.json automatically after a `docker compose restart vite`.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insights-vite.rule=Host(`vite.insights.dev.local.test`)"
      - "traefik.http.routers.insights-vite.entrypoints=web"
      - "traefik.http.services.insights-vite.loadbalancer.server.port=5173"
    networks:
      - web

networks:
  web:
    external: true
